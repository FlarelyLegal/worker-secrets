name: "HFS Secrets"
description: "Fetch secrets from your encrypted HFS vault into GitHub Actions environment variables"
branding:
  icon: lock
  color: orange

inputs:
  url:
    description: "Vault URL (e.g. https://secrets.example.com)"
    required: true
  client-id:
    description: "Service token client ID (from hfs token register)"
    required: true
  client-secret:
    description: "Service token client secret"
    required: true
  secrets:
    description: |
      Newline-separated list of secret keys to fetch.
      Lines starting with # are ignored.
      Use KEY_NAME:ENV_NAME to map to a different env var name.
    required: true
  export:
    description: "Export secrets as environment variables (default: true)"
    required: false
    default: "true"
  mask:
    description: "Mask secret values in GitHub Actions logs (default: true)"
    required: false
    default: "true"

outputs:
  json:
    description: "JSON object of fetched secrets ({ key: value, ... })"
    value: ${{ steps.fetch.outputs.json }}
  count:
    description: "Number of secrets fetched"
    value: ${{ steps.fetch.outputs.count }}

runs:
  using: composite
  steps:
    - name: Fetch secrets from vault
      id: fetch
      shell: bash
      run: |
        set -euo pipefail

        # Validate inputs
        if [[ -z "${{ inputs.url }}" ]]; then
          echo "::error::Vault URL is required"
          exit 1
        fi

        VAULT_URL="${{ inputs.url }}"
        VAULT_URL="${VAULT_URL%/}"  # strip trailing slash
        COUNT=0
        JSON_RESULT="{}"

        # Process each secret key
        while IFS= read -r line; do
          line="${line#"${line%%[![:space:]]*}"}"  # trim leading whitespace
          line="${line%"${line##*[![:space:]]}"}"  # trim trailing whitespace
          [[ -z "$line" || "$line" == \#* ]] && continue

          # Support KEY:ENV_NAME mapping
          SECRET_KEY="${line%%:*}"
          if [[ "$line" == *:* ]]; then
            ENV_NAME="${line#*:}"
          else
            # Default: uppercase, replace dashes/dots with underscores
            ENV_NAME=$(echo "$SECRET_KEY" | tr '[:lower:]' '[:upper:]' | tr '-.' '__')
          fi

          # Fetch secret via authenticated API call
          HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/hfs_response.json \
            --max-time 15 \
            --fail-with-body \
            -H "CF-Access-Client-Id: ${{ inputs.client-id }}" \
            -H "CF-Access-Client-Secret: ${{ inputs.client-secret }}" \
            -H "Content-Type: application/json" \
            "${VAULT_URL}/secrets/${SECRET_KEY}" 2>/dev/null) || true

          if [[ "$HTTP_CODE" != "200" ]]; then
            ERROR=$(jq -r '.error // "Unknown error"' /tmp/hfs_response.json 2>/dev/null || echo "HTTP $HTTP_CODE")
            echo "::error::Failed to fetch '${SECRET_KEY}': ${ERROR}"
            rm -f /tmp/hfs_response.json
            exit 1
          fi

          # Extract value using jq (available on all GitHub runners)
          VALUE=$(jq -r '.value // empty' /tmp/hfs_response.json)
          rm -f /tmp/hfs_response.json

          if [[ -z "$VALUE" ]]; then
            echo "::error::Secret '${SECRET_KEY}' returned empty value"
            exit 1
          fi

          # Mask the value in all subsequent log output
          if [[ "${{ inputs.mask }}" == "true" ]]; then
            echo "::add-mask::${VALUE}"
          fi

          # Export as environment variable
          if [[ "${{ inputs.export }}" == "true" ]]; then
            {
              echo "${ENV_NAME}<<__HFS_EOF__"
              echo "${VALUE}"
              echo "__HFS_EOF__"
            } >> "$GITHUB_ENV"
          fi

          # Accumulate JSON output (using jq for safe escaping)
          JSON_RESULT=$(echo "$JSON_RESULT" | jq --arg k "$SECRET_KEY" --arg v "$VALUE" '. + {($k): $v}')
          COUNT=$((COUNT + 1))

        done <<< "${{ inputs.secrets }}"

        # Set outputs
        echo "json=${JSON_RESULT}" >> "$GITHUB_OUTPUT"
        echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
        echo "::notice::Fetched ${COUNT} secret(s) from vault"
