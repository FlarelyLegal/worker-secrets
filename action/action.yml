name: "HFS Secrets"
description: "Fetch secrets from your HFS vault and set them as environment variables or outputs"
branding:
  icon: lock
  color: orange

inputs:
  url:
    description: "Vault URL (e.g. https://secrets.example.com)"
    required: true
  client-id:
    description: "Service token client ID"
    required: true
  client-secret:
    description: "Service token client secret"
    required: true
  secrets:
    description: "Newline-separated list of secret keys to fetch"
    required: true
  export:
    description: "Set secrets as environment variables (default: true)"
    required: false
    default: "true"
  mask:
    description: "Mask secret values in logs (default: true)"
    required: false
    default: "true"

outputs:
  secrets:
    description: "JSON object of fetched secrets (key → value)"
    value: ${{ steps.fetch.outputs.secrets }}

runs:
  using: composite
  steps:
    - id: fetch
      shell: bash
      env:
        HFS_URL: ${{ inputs.url }}
        HFS_CLIENT_ID: ${{ inputs.client-id }}
        HFS_CLIENT_SECRET: ${{ inputs.client-secret }}
        HFS_SECRETS: ${{ inputs.secrets }}
        HFS_EXPORT: ${{ inputs.export }}
        HFS_MASK: ${{ inputs.mask }}
      run: |
        # Fetch secrets from HFS vault
        json_output="{}"

        while IFS= read -r key; do
          key=$(echo "$key" | xargs)  # trim whitespace
          [ -z "$key" ] && continue
          [ "${key:0:1}" = "#" ] && continue

          # Fetch secret value via API
          response=$(curl -sf --max-time 10 \
            -H "CF-Access-Client-Id: $HFS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $HFS_CLIENT_SECRET" \
            -H "Content-Type: application/json" \
            "$HFS_URL/secrets/$(python3 -c "import urllib.parse; print(urllib.parse.quote('$key', safe=''))")" \
            2>&1) || {
            echo "::error::Failed to fetch secret '$key'"
            exit 1
          }

          value=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin).get('value',''),end='')")

          # Mask value in logs
          if [ "$HFS_MASK" = "true" ]; then
            echo "::add-mask::$value"
          fi

          # Export as environment variable
          if [ "$HFS_EXPORT" = "true" ]; then
            shell_key=$(echo "$key" | tr '[:lower:]-.' '[:upper:]__')
            {
              echo "${shell_key}<<HFSEOF"
              echo "$value"
              echo "HFSEOF"
            } >> "$GITHUB_ENV"
          fi

          # Build JSON output
          escaped_value=$(echo "$value" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().rstrip('\n')))")
          json_output=$(echo "$json_output" | python3 -c "import sys,json; d=json.load(sys.stdin); d['$key']=$escaped_value; print(json.dumps(d))")

        done <<< "$HFS_SECRETS"

        echo "secrets=$json_output" >> "$GITHUB_OUTPUT"
        echo "::notice::Fetched $(echo "$HFS_SECRETS" | grep -c '[^ ]') secret(s) from vault"
