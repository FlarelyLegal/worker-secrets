name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 24

      - name: Install root deps
        run: npm ci

      - name: Install Worker deps
        run: cd secret-vault && npm ci

      - name: Install CLI deps
        run: cd hfs && npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check Worker
        run: cd secret-vault && npx tsc --noEmit

      - name: Type-check CLI
        run: cd hfs && npx tsc --noEmit

      - name: Test Worker
        run: cd secret-vault && npx vitest run --project unit

      - name: Test CLI
        run: cd hfs && npx vitest run

      - name: Build CLI
        run: cd hfs && npm run build

      - name: Publish to GitHub Packages
        run: |
          cd hfs
          # GitHub Packages requires scope to match repo owner
          npm pkg set name="@flarelylegal/hfs-cli"
          printf 'registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}\n' > .npmrc
          npm publish || true
          # Restore original name
          npm pkg set name="@homeflare/hfs"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release notes
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72  # v4
        with:
          config: cliff.toml
          args: --offline --latest -o RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          body_path: RELEASE_NOTES.md
