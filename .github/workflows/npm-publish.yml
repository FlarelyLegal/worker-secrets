name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (don't actually publish)"
        type: boolean
        default: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install root deps
        run: npm ci

      - name: Install CLI deps
        run: cd hfs && npm ci

      - name: Lint
        run: npm run lint

      - name: Build CLI
        run: cd hfs && npm run build

      - name: Type-check
        run: cd hfs && npx tsc --noEmit

      - name: Test
        run: cd hfs && npx vitest run

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry-run
        run: cd hfs && npm publish --access public --dry-run

      - name: Publish
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry-run)
        run: cd hfs && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
