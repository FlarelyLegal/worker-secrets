name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 24

      - name: Install root deps
        run: npm ci

      - name: Install Worker deps
        run: cd secret-vault && npm ci

      - name: Install CLI deps
        run: cd hfs && npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check Worker
        run: cd secret-vault && npx tsc --noEmit

      - name: Test Worker
        run: cd secret-vault && npx vitest run

      - name: Type-check CLI
        run: cd hfs && npx tsc --noEmit

      - name: Build CLI
        run: cd hfs && npm run build

      - name: Test CLI
        run: cd hfs && npx vitest run
