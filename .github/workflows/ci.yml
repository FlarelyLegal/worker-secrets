name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 24

      - name: Install root deps
        run: npm ci

      - name: Install Worker deps
        run: cd secret-vault && npm ci

      - name: Install CLI deps
        run: cd hfs && npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check Worker
        run: cd secret-vault && npx tsc --noEmit

      - name: Type-check CLI
        run: cd hfs && npx tsc --noEmit

      - name: Build CLI
        run: cd hfs && npm run build
