<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Secret Vault - Health 2: Uptime style</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23f97316'/><text x='50' y='72' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='60' fill='white'>S</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafafa; --surface: #fff; --border: #e5e5e5;
      --text: #171717; --muted: #737373; --accent: #f97316; --green: #22c55e; --red: #ef4444;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --mono: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0a0a0a; --surface: #141414; --border: #262626; --text: #ededed; --muted: #888; }
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }

    .page { max-width: 480px; width: 100%; }
    .brand { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
    .brand-icon { width: 24px; height: 24px; background: var(--accent); border-radius: 0.3rem; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; color: #fff; }
    .brand-name { font-size: 0.6875rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

    .hero { background: var(--green); border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1.25rem; color: #fff; display: flex; align-items: center; justify-content: space-between; }
    .hero.down { background: var(--red); }
    .hero-text { font-size: 1.25rem; font-weight: 700; }
    .hero-dot { width: 10px; height: 10px; border-radius: 50%; background: #fff; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .service { background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem 1.25rem; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: space-between; }
    .service-left { display: flex; align-items: center; gap: 0.625rem; }
    .service-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .service-dot.down { background: var(--red); }
    .service-name { font-size: 0.875rem; font-weight: 500; }
    .service-label { font-size: 0.6875rem; color: var(--muted); }

    .meta { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); font-size: 0.6875rem; color: var(--muted); display: flex; justify-content: space-between; }
    .meta a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="page">
    <div class="brand">
      <div class="brand-icon">S</div>
      <span class="brand-name">Secret Vault</span>
    </div>

    <div class="hero">
      <span class="hero-text">All systems operational</span>
      <div class="hero-dot"></div>
    </div>

    <div class="service">
      <div class="service-left">
        <div class="service-dot"></div>
        <span class="service-name">Database</span>
      </div>
      <span class="service-label">D1 / SQLite</span>
    </div>

    <div class="service">
      <div class="service-left">
        <div class="service-dot"></div>
        <span class="service-name">Feature Flags</span>
      </div>
      <span class="service-label">Workers KV</span>
    </div>

    <div class="service">
      <div class="service-left">
        <div class="service-dot"></div>
        <span class="service-name">Authentication</span>
      </div>
      <span class="service-label">Cloudflare Access</span>
    </div>

    <div class="service">
      <div class="service-left">
        <div class="service-dot"></div>
        <span class="service-name">Encryption</span>
      </div>
      <span class="service-label">AES-256-GCM + age</span>
    </div>

    <div class="meta">
      <span>2026-03-29T04:30:00.000Z</span>
      <span><a href="/">Home</a> &middot; <a href="/doc">API Docs</a></span>
    </div>
  </div>
</body>
</html>
