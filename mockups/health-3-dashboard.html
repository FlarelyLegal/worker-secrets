<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Secret Vault - Health 3: Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23f97316'/><text x='50' y='72' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='60' fill='white'>S</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafafa; --surface: #fff; --border: #e5e5e5;
      --text: #171717; --muted: #737373; --accent: #f97316; --green: #22c55e; --red: #ef4444;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --mono: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0a0a0a; --surface: #141414; --border: #262626; --text: #ededed; --muted: #888; }
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }

    .page { max-width: 520px; width: 100%; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .brand { display: flex; align-items: center; gap: 0.5rem; }
    .brand-icon { width: 24px; height: 24px; background: var(--accent); border-radius: 0.3rem; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.75rem; color: #fff; }
    .brand-name { font-size: 0.6875rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .badge { font-size: 0.6875rem; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 999px; }
    .badge.ok { background: var(--green); color: #fff; }
    .badge.down { background: var(--red); color: #fff; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.625rem; margin-bottom: 1.5rem; }
    .tile { background: var(--surface); border: 1px solid var(--border); border-radius: 0.625rem; padding: 1.25rem; }
    .tile-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.625rem; }
    .tile-name { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .tile-dot { width: 8px; height: 8px; border-radius: 50%; }
    .tile-dot.ok { background: var(--green); }
    .tile-dot.down { background: var(--red); }
    .tile-value { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.125rem; }
    .tile-value.ok { color: var(--green); }
    .tile-value.down { color: var(--red); }
    .tile-sub { font-size: 0.6875rem; color: var(--muted); }

    .info { background: var(--surface); border: 1px solid var(--border); border-radius: 0.625rem; margin-bottom: 1.5rem; }
    .info-row { display: flex; justify-content: space-between; padding: 0.625rem 1rem; font-size: 0.75rem; }
    .info-row + .info-row { border-top: 1px solid var(--border); }
    .info-label { color: var(--muted); }
    .info-value { font-weight: 500; font-family: var(--mono); font-size: 0.6875rem; }

    .nav { display: flex; gap: 0.5rem; }
    .nav a { font-size: 0.6875rem; color: var(--accent); text-decoration: none; padding: 0.375rem 0.75rem; border: 1px solid var(--border); border-radius: 0.375rem; }
    .nav a:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="brand">
        <div class="brand-icon">S</div>
        <span class="brand-name">Secret Vault</span>
      </div>
      <span class="badge ok">Healthy</span>
    </div>

    <div class="grid">
      <div class="tile">
        <div class="tile-header">
          <span class="tile-name">Database</span>
          <div class="tile-dot ok"></div>
        </div>
        <div class="tile-value ok">ok</div>
        <div class="tile-sub">Cloudflare D1</div>
      </div>
      <div class="tile">
        <div class="tile-header">
          <span class="tile-name">Flags</span>
          <div class="tile-dot ok"></div>
        </div>
        <div class="tile-value ok">ok</div>
        <div class="tile-sub">Workers KV</div>
      </div>
    </div>

    <div class="info">
      <div class="info-row">
        <span class="info-label">Timestamp</span>
        <span class="info-value">2026-03-29T04:30:00Z</span>
      </div>
      <div class="info-row">
        <span class="info-label">Region</span>
        <span class="info-value">ATL (Cloudflare Edge)</span>
      </div>
      <div class="info-row">
        <span class="info-label">Version</span>
        <span class="info-value">0.20.0</span>
      </div>
    </div>

    <div class="nav">
      <a href="/">Home</a>
      <a href="/doc">API Docs</a>
      <a href="/doc/json">OpenAPI</a>
    </div>
  </div>
</body>
</html>
